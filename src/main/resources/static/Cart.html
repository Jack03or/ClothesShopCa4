<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="adminPageShell">
        <section class="hero-panel fullWidthPanel">
            <div class="topBarRow">
                <div>
                    <h1>Your Basket</h1>
                    <p class="hero-copy">
                        Review your selected items before checkout.
                    </p>
                </div>

                <div class="topButtonRow">
                    <button class="action-card" type="button" id="cart-back-button">Back To Products</button>
                    <button class="action-card" type="button" id="cart-logout-button">Log Out</button>
                </div>
            </div>
        </section>

        <section class="cartLayout">
            <div id="cart-items" class="cartItemsPanel"></div>

            <aside class="cartSummaryPanel">
                <h2>Order Summary</h2>
                <div class="summaryRow">
                    <span>Subtotal</span>
                    <span id="cart-subtotal">€0.00</span>
                </div>
                <div class="summaryRow">
                    <span>Delivery</span>
                    <span>€0.00</span>
                </div>
                <div class="summaryTotalRow">
                    <span>Total</span>
                    <span id="cart-total">€0.00</span>
                </div>
                <button class="submit-button cartCheckoutButton" type="button" id="cart-checkout-button">Checkout</button>
            </aside>
        </section>
    </main>

    <script src="Cart.js"></script>
</body>
</html>
